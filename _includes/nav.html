<header class="site-header">
  <div class="nav-inner">
    <a class="site-title" href="{{ '/' | relative_url }}">
      <img class="mark" src="{{ '/assets/img/logo-192.png' | relative_url }}" alt="J.P. Wightman logo" width="32" height="32">
      <span>{{ site.title }}</span>
    </a>

    <button class="menu-toggle" aria-label="Menu" aria-expanded="false" aria-controls="primary-nav">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>

    <nav class="primary" id="primary-nav">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>About</a>
      <a href="{{ '/projects/' | relative_url }}"{% if page.url contains '/projects' %} class="active"{% endif %}>Projects</a>
      <a href="{{ '/notes/' | relative_url }}"{% if page.url contains '/notes' %} class="active"{% endif %}>Notes</a>
      <a href="{{ '/thoughts/' | relative_url }}"{% if page.url contains '/thoughts' %} class="active"{% endif %}>Thoughts</a>
      <a href="{{ '/cv/' | relative_url }}"{% if page.url contains '/cv' %} class="active"{% endif %}>CV</a>
      <button class="theme-toggle" aria-label="Toggle dark mode">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>
  </div>
  <div class="nav-backdrop" aria-hidden="true"></div>
</header>
