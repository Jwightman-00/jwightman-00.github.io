<header>
  <div class="site-wrapper">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav>
      <a href="{{ '/about' | relative_url }}"{% if page.url == '/about/' or page.url == '/' %} class="active"{% endif %}>About</a>
      <a href="{{ '/projects' | relative_url }}"{% if page.url contains '/projects' %} class="active"{% endif %}>Projects</a>
      <a href="{{ '/notes' | relative_url }}"{% if page.url contains '/notes' %} class="active"{% endif %}>Notes</a>
      <a href="{{ '/thoughts' | relative_url }}"{% if page.url contains '/thoughts' %} class="active"{% endif %}>Thoughts</a>
      <a href="{{ '/cv' | relative_url }}"{% if page.url contains '/cv' %} class="active"{% endif %}>CV</a>
    </nav>
  </div>
</header>
