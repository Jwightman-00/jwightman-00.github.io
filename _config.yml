title: J.P. Wightman
description: Part III Physics
url: "https://jwightman-00.github.io"
baseurl: ""

author:
  name: Jenson P Wightman
  affiliation: University of Cambridge

# Google Search Console verification token
google_site_verification: 3NlxggG1OHqj4ZNW-JyKrAljCAavfpiRDTIKaPOHTpk

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/
  notes:
    output: true
    permalink: /notes/:name/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: item
  - scope:
      path: ""
      type: notes
    values:
      layout: item
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Build
markdown: kramdown
highlighter: rouge
permalink: /thoughts/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
