<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="theme-color" content="#0f172a">
  {% if site.google_site_verification %}<meta name="google-site-verification" content="{{ site.google_site_verification }}">{% endif %}

  <link rel="icon" type="image/png" sizes="192x192" href="{{ '/assets/img/logo-192.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="512x512" href="{{ '/assets/img/logo-512.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/img/logo-512.png' | relative_url }}">
  <link rel="shortcut icon" href="{{ '/assets/img/logo-192.png' | relative_url }}">

  <!-- Set theme before paint to avoid flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="canonical" href="{{ page.url | prepend: site.url }}">
</head>
<body>
  <div class="progress-bar" aria-hidden="true"></div>

  {% include nav.html %}

  <div class="site-shell">
    <div class="site-wrapper">
      <main>
        {{ content }}
      </main>
    </div>
  </div>

  {% include footer.html %}

  <button class="to-top" aria-label="Back to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
  </button>

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
