---
layout: default
---
<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    {% if page.tags %}
    <div style="margin-top:0.5rem;">
      {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
    </div>
    {% endif %}
    {% if page.date %}<div class="post-date" style="margin-top:0.5rem;">{{ page.date | date: "%Y" }}</div>{% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
